<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Portal | SmartCheck</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    /* Styling for the new Course Header */
    #courseNameDisplay {
      background: #ecf0f1;
      padding: 10px;
      border-radius: 5px;
      color: #2980b9;
      font-size: 1.1em;
      margin-bottom: 20px;
    }

    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }
    .input-group label {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
      color: #34495e;
    }
    .styled-input {
      width: 100%;
      padding: 12px;
      border: 2px solid #bdc3c7;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }
    .styled-input:focus {
      border-color: #3498db;
      outline: none;
    }

    /* Initially hidden until the link is opened or scan is done */
    #form-section {
      display: none;
      animation: fadeIn 0.5s;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="navbar">
  <h1>Student Portal</h1>
</div>

<div class="container">
  <div class="card">

    <div id="scanner-section">
      <h3>Scan Class QR Code</h3>
      <div id="reader" style="width: 100%; border-radius: 10px; overflow: hidden;"></div>
      <p style="color: #7f8c8d; font-size: 0.9em; margin-top: 10px;">
        Point your camera at the lecturer's screen.
      </p>
    </div>

    <div id="form-section">
      <h3 id="courseNameDisplay">Registering Attendance...</h3>

      <div class="input-group">
        <label for="inputName">Full Name</label>
        <input type="text" id="inputName" class="styled-input" placeholder="Enter your name">
      </div>

      <div class="input-group">
        <label for="inputID">Student ID Number</label>
        <input type="number" id="inputID" class="styled-input" placeholder="e.g. 1122">
      </div>

      <button onclick="submitAttendance()" style="width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer;">
        Submit Attendance
      </button>
    </div>

  </div>
</div>

<script type="module" src="student.js"></script>
</body>
</html>
