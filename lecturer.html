<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lecturer Dashboard | SmartCheck</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
<div class="navbar">
  <h1>Lecturer Portal</h1>
</div>

<div class="container">
  <div class="card">
    <h3>Generate Attendance QR</h3>
    <button onclick="generateQR()">Create New Session</button>
    <div id="qrcode" style="margin-top:20px; display:flex; justify-content:center;"></div>
  </div>

  <div class="card">
    <h3>Live Attendance Sheet</h3>
    <div style="margin-bottom: 15px; display: flex; gap: 10px; justify-content: center;">
      <button onclick="downloadCSV()" style="background:#27ae60;">Download Excel (CSV)</button>
      <button onclick="clearRecords()" style="background:#e74c3c;">Clear All Records</button>
    </div>

    <table>
      <thead>
      <tr>
        <th>Student Name</th>
        <th>Student ID</th>
        <th>Time</th>
        <th>Course</th>
      </tr>
      </thead>
      <tbody id="attendanceBody">
      </tbody>
    </table>
  </div>
</div>

<script type="module" src="lecturer.js"></script>
</body>
</html>
